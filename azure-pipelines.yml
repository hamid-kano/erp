trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: hostinger-deploy
  - name: SSH_HOST
    value: $(HOSTINGER_HOST)
  - name: SSH_USER
    value: $(HOSTINGER_USER)
  - name: SSH_PORT
    value: $(HOSTINGER_PORT)
  - name: DEPLOY_PATH
    value: /home/$(HOSTINGER_USER)/domains/syriadevs.site/public_html

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'

  - task: UsePythonVersion@0
    condition: false

  - script: |
      sudo add-apt-repository ppa:ondrej/php -y
      sudo apt-get update
      sudo apt-get install -y php8.2 php8.2-cli php8.2-sqlite3 php8.2-xml php8.2-mbstring php8.2-curl
    displayName: Setup PHP

  - script: composer install --no-interaction --prefer-dist
    displayName: Install PHP Dependencies

  - script: npm ci && npm run build
    displayName: Build Frontend

  - script: |
      cp .env.example .env
      php artisan key:generate
      touch database/database.sqlite
      php artisan migrate --force
      php artisan test
    displayName: Run Tests

  - task: DownloadSecureFile@1
    name: sshKey
    inputs:
      secureFile: 'hostinger_deploy'
    displayName: Download SSH Key

  - script: |
      mkdir -p ~/.ssh
      cp $(sshKey.secureFilePath) ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa
      ssh-keyscan -p $(SSH_PORT) -H $(SSH_HOST) >> ~/.ssh/known_hosts
    displayName: Setup SSH

  - script: |
      rsync -az --delete \
        --exclude='.git' \
        --exclude='node_modules' \
        --exclude='.env' \
        --exclude='storage/logs' \
        --exclude='storage/framework/cache' \
        --exclude='database/database.sqlite' \
        -e "ssh -p $(SSH_PORT)" \
        ./ $(SSH_USER)@$(SSH_HOST):$(DEPLOY_PATH)/
    displayName: Deploy Files

  - script: |
      ssh -p $(SSH_PORT) $(SSH_USER)@$(SSH_HOST) "
        cd $(DEPLOY_PATH) &&
        composer install --no-dev --optimize-autoloader --no-interaction &&
        php artisan migrate --force &&
        php artisan config:cache &&
        php artisan route:cache &&
        php artisan view:cache
      "
    displayName: Post Deploy
